<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AkaMonday Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f3ef; --card: #ffffff; --accent: #2d6a4f; --accent2: #52b788;
      --danger: #e63946; --text: #1a1a1a; --muted: #888; --border: #e0ddd8;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { background: var(--accent); padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; color: white; letter-spacing: 1px; }
    .nav-badge { background: rgba(255,255,255,0.15); color: white; font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; }
    .container { max-width: 700px; margin: 0 auto; padding: 3rem 1.5rem; }
    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--muted); margin-bottom: 2.5rem; font-size: 0.95rem; }
    .add-form { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center; }
    .add-form input { flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
    .add-form input:focus { border-color: var(--accent2); }
    .add-form input::placeholder { color: var(--muted); }
    .btn-add { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 0.75rem 1.5rem; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
    .btn-add:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-add:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .tasks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .tasks-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; }
    .tasks-count { background: var(--accent); color: white; font-size: 0.8rem; padding: 3px 10px; border-radius: 20px; }
    .task-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .task-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; animation: slideIn 0.2s ease; transition: border-color 0.2s; }
    .task-item:hover { border-color: var(--accent2); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .task-left { display: flex; align-items: center; gap: 0.75rem; }
    .task-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
    .task-name { font-size: 0.95rem; }
    .task-date { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .btn-delete { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 5px 12px; font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .btn-delete:hover { background: var(--danger); border-color: var(--danger); color: white; }
    .empty { text-align: center; padding: 3rem; color: var(--muted); background: var(--card); border: 1px dashed var(--border); border-radius: 16px; }
    .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .loading { text-align: center; padding: 2rem; color: var(--muted); }
    .error-msg { background: #fff0f0; border: 1px solid #ffd0d0; color: var(--danger); border-radius: 10px; padding: 0.75rem 1rem; font-size: 0.9rem; margin-bottom: 1rem; }
    .aws-badge { display: flex; align-items: center; gap: 0.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.6rem 1rem; font-size: 0.8rem; color: var(--muted); margin-top: 2.5rem; }
    .aws-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }
  </style>
</head>
<body>
<nav>
  <div class="logo">AkaMonday</div>
  <div class="nav-badge">Powered by AWS Lambda</div>
</nav>
<div class="container">
  <h1>Task Manager</h1>
  <p class="subtitle">Add, view, and delete your tasks — saved in AWS DynamoDB</p>
  <div id="error" class="error-msg" style="display:none;"></div>
  <div class="add-form">
    <input type="text" id="taskInput" placeholder="Type a new task..."/>
    <button class="btn-add" id="addBtn" onclick="addTask()">Add Task</button>
  </div>
  <div class="tasks-header">
    <div class="tasks-title">Your Tasks</div>
    <div class="tasks-count" id="count">0</div>
  </div>
  <div class="task-list" id="taskList">
    <div class="loading">Loading tasks...</div>
  </div>
  <div class="aws-badge">
    <div class="aws-dot"></div>
    Connected to AWS API Gateway → Lambda → DynamoDB
  </div>
</div>
<script>
  const API_URL = "https://e5a8h7jnb7.execute-api.eu-north-1.amazonaws.com";

  async function loadTasks() {
    try {
      const res = await fetch(`${API_URL}/tasks`);
      const tasks = await res.json();
      renderTasks(tasks);
    } catch (err) {
      showError("Could not load tasks. Make sure your API Gateway URL is set.");
      document.getElementById("taskList").innerHTML = "";
    }
  }

  async function addTask() {
    const input = document.getElementById("taskInput");
    const name = input.value.trim();
    if (!name) return;
    const btn = document.getElementById("addBtn");
    btn.disabled = true;
    btn.textContent = "Adding...";
    try {
      await fetch(`${API_URL}/tasks`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      });
      input.value = "";
      loadTasks();
    } catch (err) {
      showError("Could not add task. Check your API Gateway URL.");
    }
    btn.disabled = false;
    btn.textContent = "Add Task";
  }

  async function deleteTask(id) {
    try {
      await fetch(`${API_URL}/tasks/${id}`, { method: "DELETE" });
      loadTasks();
    } catch (err) {
      showError("Could not delete task.");
    }
  }

  function renderTasks(tasks) {
    const list = document.getElementById("taskList");
    document.getElementById("count").textContent = tasks.length;
    if (!tasks.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div>No tasks yet — add your first one!</div></div>`;
      return;
    }
    list.innerHTML = tasks.map(task => `
      <div class="task-item">
        <div class="task-left">
          <div class="task-dot"></div>
          <div>
            <div class="task-name">${task.name}</div>
            <div class="task-date">${task.createdAt || ""}</div>
          </div>
        </div>
        <button class="btn-delete" onclick="deleteTask('${task.id}')">Delete</button>
      </div>
    `).join("");
  }

  function showError(msg) {
    const el = document.getElementById("error");
    el.textContent = msg;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 4000);
  }

  document.getElementById("taskInput").addEventListener("keypress", e => {
    if (e.key === "Enter") addTask();
  });

  loadTasks();
</script>
</body>
</html>
